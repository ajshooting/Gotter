{{define "title"}}Sign in - {{.AppName}}{{end}}

{{define "content"}}
<section class="login-panel">
  <div>
    <p class="eyebrow">{{.AllowedTeam}}</p>
    <h1>{{.AppName}}</h1>
    <p class="lead">Private team timeline.</p>
  </div>
  {{if .FlashError}}
    <p class="notice">{{.FlashError}}</p>
  {{end}}
  <a class="button button-primary button-wide" href="/auth/esa/start">Sign in with esa</a>
</section>
{{end}}
