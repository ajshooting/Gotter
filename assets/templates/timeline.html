{{define "title"}}Timeline - {{.AppName}}{{end}}

{{define "content"}}
<section class="composer">
  <form method="post" action="/posts" data-composer>
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label class="sr-only" for="body">Post</label>
    <textarea id="body" name="body" maxlength="{{.MaxBodyLength}}" rows="4" placeholder="Write" data-body></textarea>
    <div class="composer-actions">
      <span class="counter" data-counter>{{.MaxBodyLength}}</span>
      <button class="button button-primary" type="submit">Post</button>
    </div>
  </form>
  {{if .FlashError}}
    <p class="notice">{{.FlashError}}</p>
  {{end}}
</section>

{{template "postList" .}}
{{end}}
